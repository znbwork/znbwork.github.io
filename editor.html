<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-t="ui_title">简历编辑器</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: #fff; padding: 16px 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { font-size: 24px; color: #333; }
        .lang-bar { display: flex; gap: 8px; }
        .lang-btn { padding: 8px 16px; border: 1px solid #ddd; background: #fff; cursor: pointer; border-radius: 4px; }
        .lang-btn.active { background: #007bff; color: #fff; border-color: #007bff; }
        .tabs { display: flex; gap: 4px; margin-bottom: 16px; background: #fff; padding: 12px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow-x: auto; flex-wrap: wrap; }
        .tab-btn { padding: 10px 20px; border: none; background: transparent; cursor: pointer; border-radius: 4px; white-space: nowrap; }
        .tab-btn.active { background: #007bff; color: #fff; }
        .editor-section { display: none; background: #fff; border-radius: 8px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .editor-section.active { display: block; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 6px; color: #333; font-size: 14px; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        .form-group textarea { min-height: 60px; resize: vertical; }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
        .section-header { font-size: 16px; font-weight: 600; margin: 20px 0 12px; padding-bottom: 8px; border-bottom: 2px solid #007bff; color: #333; }
        .section-header:first-of-type { margin-top: 0; }
        .controls { display: flex; gap: 12px; margin-top: 24px; padding-top: 20px; border-top: 1px solid #eee; }
        .btn { padding: 12px 24px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .btn-primary { background: #007bff; color: #fff; }
        .btn-success { background: #28a745; color: #fff; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .status { margin-top: 12px; font-size: 14px; }
        .status.success { color: #28a745; }
        .status.error { color: #dc3545; }
    </style>
</head>
<body>
    <div class="header">
        <h1 data-t="ui_title">简历内容编辑</h1>
        <div class="lang-bar">
            <button class="lang-btn" data-lang="zh">中文</button>

    <div class="tabs">

        <button class="tab-btn" data-tab="company" data-t="tab_company">公司经历</button>

        <button class="tab-btn" data-tab="skills" data-t="tab_skills">技术技能</button>
        <button class="tab-btn" data-tab="pr" data-t="tab_pr">自我PR</button>
    </div>

    <script>
        (function() {
            var API_URL = 'http://localhost:' + location.port + '/api/data';
            var currentLang = 'ja';
            var jsonData = {};
            var labelMap = {};

            async function loadData() {
                try {
                    var res = await fetch(API_URL);
                    jsonData = await res.json();
                    fillAllForms();
                    updateLabels();
                    console.log('Initial lang:', currentLang, 'Title:', jsonData[currentLang] && jsonData[currentLang].ui_title);
                } catch (err) {
                    showStatus('加载失败: ' + err.message, 'error');
                }
            }

            function fillAllForms() {
                var data = jsonData[currentLang] || {};
                var fields = document.querySelectorAll('[data-field]');
                for (var i = 0; i < fields.length; i++) {
                    var field = fields[i];
                    var key = field.getAttribute('data-field');
                    field.value = data[key] || '';
                }
            }

            function updateLabels() {
                var data = jsonData[currentLang] || {};

                var uiKeys = [
                    'ui_title', 'tab_basic', 'tab_strengths', 'tab_education', 'tab_company', 
                    'tab_projects', 'tab_skills', 'tab_pr', 'btn_save', 'btn_preview',
                    'lbl_name', 'lbl_title', 'lbl_summary', 'lbl_summary_title', 'lbl_summary_text', 'lbl_email',
                    'lbl_strengths_title', 'lbl_edu_title', 'lbl_period', 'lbl_school_label', 'lbl_school',
                    'lbl_company_title', 'lbl_company_name', 'lbl_proj_title', 'lbl_skill_title',
                    'lbl_skill_lang', 'lbl_skill_os', 'lbl_skill_db', 'lbl_skill_fw', 'lbl_skill_cloud', 'lbl_skill_tools', 'lbl_tech_env',
                    'lbl_pr_title'
                ];
                for (var k = 0; k < uiKeys.length; k++) {
                    var uk = uiKeys[k];
                    var uEls = document.querySelectorAll('[data-t="' + uk + '"]');
                    for (var m = 0; m < uEls.length; m++) {
                        if (data[uk]) {
                            var el = uEls[m];
                            if (el.tagName === 'TITLE') {
                                document.title = data[uk];
                            } else {
                                el.textContent = data[uk];
                            }
                        }
                    }
                }
            }

            function reloadData() {
                fetch(API_URL).then(function(r) { return r.json(); }).then(function(d) {
                    jsonData = d;
                    fillAllForms();
                    updateLabels();
                    console.log('Reloaded, currentLang=', currentLang, 'ui_title=', jsonData[currentLang] && jsonData[currentLang].ui_title);
                });
            }

            function showStatus(msg, type) {
                var statusEl = document.getElementById('status');
                statusEl.textContent = msg;
                statusEl.className = 'status ' + type;
            }

            function collectData() {
                var data = {};
                var fields = document.querySelectorAll('[data-field]');
                for (var i = 0; i < fields.length; i++) {
                    var field = fields[i];
                    if (field.value) {
                        data[field.getAttribute('data-field')] = field.value;
                    }
                }
                return data;
            }

            var langBtns = document.querySelectorAll('.lang-btn');
            for (var i = 0; i < langBtns.length; i++) {
                langBtns[i].addEventListener('click', function() {
                    document.querySelectorAll('.lang-btn').forEach(function(b) { b.classList.remove('active'); });
                    this.classList.add('active');
                    currentLang = this.getAttribute('data-lang');
                    console.log('Language changed to:', currentLang);
                    var newData = jsonData[currentLang] || {};
                    console.log('  ui_title in data:', newData.ui_title);
                    console.log('  elements found:', document.querySelectorAll('[data-t="ui_title"]').length);
                    fillAllForms();
                    updateLabels();
                });
            }

            var tabBtns = document.querySelectorAll('.tab-btn');
            for (var i = 0; i < tabBtns.length; i++) {
                tabBtns[i].addEventListener('click', function() {
                    for (var j = 0; j < tabBtns.length; j++) {
                        tabBtns[j].classList.remove('active');
                    }
                    var sections = document.querySelectorAll('.editor-section');
                    for (var j = 0; j < sections.length; j++) {
                        sections[j].classList.remove('active');
                    }
                    this.classList.add('active');
                    var tabName = this.getAttribute('data-tab');
                    document.querySelector('[data-section="' + tabName + '"]').classList.add('active');
                });
            }

            document.getElementById('saveBtn').addEventListener('click', async function() {
                var btn = document.getElementById('saveBtn');
                btn.disabled = true;

                try {
                    var formData = collectData();
                    jsonData[currentLang] = Object.assign({}, jsonData[currentLang], formData);

                    var res = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(jsonData)
                    });

                    if (res.ok) {
                        showStatus('保存成功', 'success');
                    } else {
                        throw new Error('保存失败');
                    }
                } catch (err) {
                    showStatus('保存失败: ' + err.message, 'error');
                } finally {
                    btn.disabled = false;
                }
            });

            document.getElementById('previewBtn').addEventListener('click', function() {
                window.open('index.html?lang=' + currentLang, '_blank');
            });

            loadData();
        })();
    </script>
</body>
</html>
